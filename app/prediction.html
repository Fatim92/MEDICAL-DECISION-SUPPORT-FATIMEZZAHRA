<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction - Obesity Risk</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar -->
    <nav>
        <div class="logo">ObesityCare</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="prediction.html" class="active">Prediction</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <a href="contact.html" class="btn-nav">Get in Touch</a>
    </nav>

    <!-- Prediction Form -->
    <section class="prediction-form">
        <h2>Patient Information</h2>
        <form id="predictionForm">
            <label for="age">Age</label>
            <input type="number" id="age" name="age" required>

            <label for="height">Height (cm)</label>
            <input type="number" id="height" name="height" required>

            <label for="weight">Weight (kg)</label>
            <input type="number" id="weight" name="weight" required>

            <label for="family_history">Family History of Obesity?</label>
            <select id="family_history" name="family_history">
                <option value="Yes">Yes</option>
                <option value="No" selected>No</option>
            </select>

            <label for="activity">Physical Activity Level</label>
            <select id="activity" name="activity">
                <option value="Low">Low</option>
                <option value="Moderate">Moderate</option>
                <option value="High" selected>High</option>
            </select>

            <button type="submit" class="btn-hero">Predict Risk</button>
        </form>

        <div id="result">
            <p>Prediction will appear here...</p>
        </div>
    </section>

</body>
</html>
