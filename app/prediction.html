<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction - Medical Decision Support</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="prediction.html" class="active">Prediction</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>
    </header>

    <section class="form-section">
        <h1>Patient Information</h1>
        <form>
            <label for="age">Age</label>
            <input type="number" id="age" name="age">

            <label for="height">Height (cm)</label>
            <input type="number" id="height" name="height">

            <label for="weight">Weight (kg)</label>
            <input type="number" id="weight" name="weight">

            <label for="family_history">Family History of Obesity?</label>
            <select id="family_history" name="family_history">
                <option>No</option>
                <option>Yes</option>
            </select>

            <label for="activity">Physical Activity Level</label>
            <select id="activity" name="activity">
                <option>Low</option>
                <option>Moderate</option>
                <option>High</option>
            </select>

            <button type="submit" class="btn">Predict</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Medical Decision Support</p>
    </footer>
</body>
</html>
